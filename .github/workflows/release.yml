name: Release

# Push a tag like v1.0.1 to build and publish a new release:
#   git tag v1.0.1 && git push origin v1.0.1
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (mac arm64 + x64)
        run: npx electron-builder --mac --arm64 --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple cert in CI yet — skip code signing rather than fail the build.
          CSC_IDENTITY_AUTO_DISCOVERY: false
